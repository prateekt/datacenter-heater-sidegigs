# Reference sizes for secondary waste-heat applications (metrics only).
# Used to translate delivered kWh into pools, fisheries, homes, etc.

olympic_pool:
  volume_m3: 2500
  annual_heat_kwh: 180000
  source: "Order-of-magnitude outdoor competition pool heating (SW U.S.)"

community_pool:
  volume_m3: 2000
  annual_heat_kwh: 45000
  source: "Municipal / hotel pool ~2 ML"

aquaculture:
  raceway_volume_m3: 500
  setpoint_c: 22.0
  maintenance_w_per_m3: 55
  source: "Tilapia/trout raceway — ~50–60 W/m³ to hold temp in desert colocation"
  fish_kg_per_m3_year: 25
  source_fish: "USDA aquaculture productivity mid-range intensive raceway"

district_heat:
  us_home_annual_heat_kwh: 8000
  source: "EIA — average U.S. home space-heating energy ~6–10 MWh/yr"

homeless_shelter_shower:
  kwh_per_shower: 2.5
  duration_min: 8
  water_liters: 60
  inlet_temp_c: 15
  outlet_temp_c: 42
  source: "Mobile shower / shelter unit — ~60 L heated ~27°C plus distribution losses (Lava Mae–class dignity shower)"

algae_pond:
  hectares_per_mw_heat: 0.5
  source: "Rough PBR sizing — ~0.5 ha algae pond per MW thermal service"

application_scenarios:
  - id: dac_priority
    label: "DAC priority (climate)"
    config: config/nvidia_us_expansion.yaml
    robot_priority: "carbon_capture → algae → buffer"
    routing_note: "Pools and fisheries are not in the robot list — all recoverable heat goes to DAC regeneration (~71 GWh/yr)."
  - id: community_heat
    label: "Community heat (pools + fisheries)"
    config: config/nvidia_us_community.yaml
    robot_priority: "pool → aquaculture → algae → carbon_capture → buffer"
    routing_note: "Amenities first; DAC gets leftover heat (~2.9 GWh/yr) — large CO₂ trade-off vs climate priority."
  - id: algae_dac_balanced
    label: "Algae + DAC balanced"
    config: config/nvidia_us_algae.yaml
    robot_priority: "algae → carbon_capture → buffer"
    routing_note: "No pools/fisheries. Algae is first in line — daytime pond maintenance starves DAC (~6.2 GWh/yr), so total routed heat (~9.9 GWh/yr) is far below DAC-only (~71 GWh/yr)."

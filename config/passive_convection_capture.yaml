# Speculative passive convection DAC — default parameters (not deployed at scale)
passive_convection:
  enabled: true
  dac_mode: convection_hybrid
  chimney_height_m: 120
  chimney_area_m2: 800
  contactor_area_m2: 50000
  bed_resistance_pa_s2_kg2: 0.002
  waste_heat_to_air_fraction: 0.35
  capture_efficiency: 0.15
  ambient_co2_ppm: 420
  fan_efficiency: 0.65
  air_density_kg_m3: 1.2
  cp_air: 1005.0
  gravity: 9.81
  discharge_coeff: 0.65
  min_delta_t_k: 2.0
  cycle:
    adsorb_hours: 8
    regen_hours: 2
  regen:
    reuse_liquid_loop: true
    regeneration_temp: 90.0
    min_source_temp: 40.0
    heat_pump_cop: 3.2
    specific_heat_duty_j_per_kg: 5500000.0
    hp_capacity_w: 8100000.0

climate:
  grid_co2_kg_per_kwh: 0.39

plain_english_gaps:
  - q: "Has anyone built mechanical music from GPU fan noise?"
    a: "Not in published literature. Physical generative computing exists in lab scale; DC music diffusion is our deliberate gap."
  - q: "Do metamaterial liners work on real racks?"
    a: "Yes at rack scale (Bell Labs SeMSA). Perimeter soundscape valorization at AI-campus scale is not demonstrated."
  - q: "Why not just use speakers and AI software?"
    a: "This side gig asks what **passive/mechanical** paths could do with exhaust already on site — complementary, not exclusive."
  - q: "DDPM vs Langevin — when is passive hardware enough?"
    a: "Software DDPM needs a learned score at every step; Langevin MDM replaces that with -∇E_θ. If distillation error is low, springs may suffice; if not, software ceiling (Java-LDM) shows the task is learnable but needs richer hardware."
  - q: "Why is Java-LDM not AudioLDM 2?"
    a: "Billions of params and GPU training vs our ~200k-param CPU task model. Literature FAD/CLAP numbers cite true SOTA; we compare tiers fairly on the same DC fan-noise task."
